<content class="block wh-full flex flex-col">
  @if (!widgetConfigOpen()) {
    <header>
      <hs-dashboard-toolbar [isMobile]="isMobile()"></hs-dashboard-toolbar>
    </header>
  }
  <mat-divider class="w-full"></mat-divider>
  <main class="flex-1 h-0">
    <mat-sidenav-container class="wh-full">
      <mat-sidenav
        #sidenavStart
        [mode]="isMobile() ? 'over' : 'side'"
        [opened]="dashboardListOpen()"
        [disableClose]="!isMobile()"
        [fixedInViewport]="false"
      >
        <aside class="flex wh-full bg-[var(--base-bg-color)]">
          <div class="w-full px-12px pt-12px pb-8px">
            @if (appId) {
              <hs-tree
                [businessId]="appId"
                [businessKey]="businessKey"
                [treeConfig]="treeConfig()"
              ></hs-tree>
            }
          </div>
          <!-- <mat-divider
            [vertical]="true"
            class="h-full"
          ></mat-divider> -->
        </aside>
      </mat-sidenav>

      <mat-sidenav-content [class]="widgetConfigOpen() ? 'mr-500px' : ''">
        <hs-dashboard-viewport [isMobile]="isMobile()"></hs-dashboard-viewport>
      </mat-sidenav-content>

      <mat-sidenav
        #sidenavEnd
        [mode]="isMobile() ? 'over' : 'side'"
        [opened]="widgetListOpen()"
        [disableClose]="!isMobile()"
        position="end"
        [fixedInViewport]="false"
      >
        <aside class="flex wh-full bg-[var(--base-bg-color)]">
          <hs-widget-folder class="flex-1 p-8px" [dashboardDesign]="true"></hs-widget-folder>
        </aside>
      </mat-sidenav>
      @if (widgetConfigOpen()) {
        <mat-sidenav
          #sidenavConfig
          [mode]="isMobile() ? 'over' : 'side'"
          [opened]="widgetConfigOpen()"
          [disableClose]="!isMobile()"
          position="end"
          [fixedInViewport]="false"
          class="w-500px!"
        >
          <aside class="wh-full bg-[var(--base-bg-color)]">
            <hs-dashboard-widget-config></hs-dashboard-widget-config>
          </aside>
        </mat-sidenav>
      }
    </mat-sidenav-container>
  </main>
</content>
